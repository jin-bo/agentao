name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build, verify, and publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release tag matches package version
        if: github.event_name == 'release'
        run: |
          python - <<'PY'
          import pathlib
          import re

          init_py = pathlib.Path("agentao/__init__.py").read_text(encoding="utf-8")
          match = re.search(r'^__version__\s*=\s*"([^"]+)"', init_py, re.MULTILINE)
          if not match:
              raise SystemExit("Could not find __version__ in agentao/__init__.py")

          package_version = match.group(1)
          release_tag = "${{ github.event.release.tag_name }}"
          normalized_tag = release_tag[1:] if release_tag.startswith("v") else release_tag

          print(f"package version: {package_version}")
          print(f"release tag: {release_tag}")

          if normalized_tag != package_version:
              raise SystemExit(
                  f"Release tag {release_tag!r} does not match package version {package_version!r}"
              )
          PY

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (with cli/web/i18n extras for CLI-dependent unit tests)
        # Mirrors the same install matrix used by .github/workflows/ci.yml's
        # Test job. After P0.9 the bundled CLI deps live in `[cli]`;
        # tests/test_menu_confirmation.py, test_readchar_confirmation.py,
        # test_cli_dashboard.py, test_skill_crystallize_enhancement.py, etc.
        # all import from agentao.cli or read prompt_toolkit/readchar at
        # collect time. Without these extras the test step fails before
        # build/publish run.
        run: uv sync --python 3.12 --extra cli --extra web --extra i18n

      - name: Run tests in CI offline mode
        env:
          GITHUB_ACTIONS: "true"
          AGENTAO_TEST_LIVE_MODELS: "0"
          AGENTAO_TEST_LIVE_LLM: "0"
        run: uv run --python 3.12 python -m pytest tests/ -v --tb=short

      - name: Build wheel and sdist
        run: uv build

      - name: Check dist metadata with twine
        run: uvx twine check dist/*

      - name: Smoke install from built wheel
        run: |
          python -m venv .publish-venv
          source .publish-venv/bin/activate
          pip install dist/*.whl
          python -c "
          import agentao
          print('version:', agentao.__version__)
          from agentao import Agentao, SkillManager
          print('Public API OK')
          "
          python -c "from agentao.cli import entrypoint; print('CLI entrypoint OK')"
          python -c "import shutil; assert shutil.which('agentao'), 'agentao not found on PATH'; print('agentao on PATH OK')"
          python -c "
          import agentao.skills.manager as m
          bundled = m._BUNDLED_SKILLS_DIR
          assert bundled.exists(), f'Bundled skills dir missing: {bundled}'
          skills = [d.name for d in bundled.iterdir() if d.is_dir()]
          assert 'skill-creator' in skills, f'skill-creator not found in {bundled}: {skills}'
          print('Bundled skills OK:', skills)
          "

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
