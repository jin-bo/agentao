name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 0 · Generated-schema drift check (fast fail signal)
  # ─────────────────────────────────────────────────────────────
  schema-check:
    name: Schema drift
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --python 3.12

      - name: Verify replay schemas match agentao/replay/events.py
        run: uv run --python 3.12 python scripts/write_replay_schema.py --check

      - name: Verify host schemas match agentao/host/models.py + agentao/acp/schema.py
        run: uv run --python 3.12 python scripts/write_host_schema.py --check

  # ─────────────────────────────────────────────────────────────
  # Job 0b · P0.4 typing gate — mypy --strict on agentao.host
  # ─────────────────────────────────────────────────────────────
  typing-gate:
    name: Typing gate (mypy --strict on host)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (incl. dev group for mypy)
        run: uv sync --python 3.12 --group dev

      - name: mypy --strict --package agentao.host
        run: uv run --python 3.12 mypy --strict --package agentao.host

  # ─────────────────────────────────────────────────────────────
  # Job 1 · Unit tests across Python 3.10 / 3.11 / 3.12
  # ─────────────────────────────────────────────────────────────
  test:
    name: Test · Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (with cli/web/i18n extras for CLI-dependent unit tests)
        # Default unit tests import agentao.cli.AgentaoCLI / web fetch tool /
        # jieba memory paths, which after the P0.9 dependency split live
        # in optional extras. Install all three so the existing test
        # surface still resolves; the core-only contract is separately
        # validated by the smoke job and tests/test_dependency_split.py.
        run: uv sync --python ${{ matrix.python-version }} --extra cli --extra web --extra i18n

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} python -m pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────────────────────
  # Job 2 · Build wheel + sdist, verify metadata with twine
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Build wheel and sdist
        run: uv build

      - name: Check dist metadata with twine
        run: uvx twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Job 3 · Install from wheel, verify imports + CLI entry point
  # ─────────────────────────────────────────────────────────────
  smoke:
    name: Smoke · Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install wheel into a clean environment (core only)
        run: pip install dist/*.whl

      - name: Core-only embed construct (P0.9 — no [cli]/[web]/[i18n] extras)
        run: |
          python -c "
          import tempfile
          from pathlib import Path
          from agentao import Agentao
          from agentao.llm import LLMClient
          from agentao.transport import NullTransport
          agent = Agentao(
              working_directory=Path(tempfile.mkdtemp()),
              llm_client=LLMClient(api_key='dummy', base_url='http://localhost:1', model='dummy'),
              transport=NullTransport(),
              project_instructions='hi',
          )
          try:
              print('Core-only construct OK')
          finally:
              agent.close()
          "

      - name: Add [cli] extra for CLI surface checks
        run: |
          # Glob expansion happens in the shell, not in pip — so resolve
          # the concrete wheel path first and then append the extra.
          WHEEL=$(ls dist/agentao-*.whl)
          pip install "${WHEEL}[cli]"

      - name: Import check — package and public API
        run: |
          python -c "
          import agentao
          print('version:', agentao.__version__)
          from agentao import Agentao, SkillManager
          print('Public API OK')
          "

      - name: PEP 561 — py.typed marker present in installed package
        run: python -c "from importlib.resources import files; assert files('agentao').joinpath('py.typed').is_file(), 'py.typed missing'; print('py.typed OK')"

      - name: Embedded-construct smoke (matches README "Embed in 30 lines")
        run: |
          python -c "
          import tempfile
          from pathlib import Path
          from agentao import Agentao
          from agentao.llm import LLMClient
          from agentao.transport import NullTransport
          agent = Agentao(
              working_directory=Path(tempfile.mkdtemp()),
              llm_client=LLMClient(api_key='dummy', base_url='http://localhost:1', model='dummy'),
              transport=NullTransport(),
          )
          try:
              print('Embedded construct OK')
          finally:
              agent.close()
          "

      - name: Import check — CLI entry point importable
        run: python -c "from agentao.cli import entrypoint; print('CLI entrypoint OK')"

      - name: Verify agentao command is on PATH
        run: python -c "import shutil; assert shutil.which('agentao'), 'agentao not found on PATH'; print('agentao on PATH OK')"

      - name: Verify bundled skills are discoverable after install
        run: |
          python -c "
          from pathlib import Path
          import agentao.skills.manager as m
          bundled = m._BUNDLED_SKILLS_DIR
          assert bundled.exists(), f'Bundled skills dir missing: {bundled}'
          skills = [d.name for d in bundled.iterdir() if d.is_dir()]
          assert 'skill-creator' in skills, f'skill-creator not found in {bundled}: {skills}'
          print('Bundled skills OK:', skills)
          "

  # ─────────────────────────────────────────────────────────────
  # Job 4 · Embedding examples (P0.6) — each runs its own smoke
  # ─────────────────────────────────────────────────────────────
  examples:
    name: Examples · ${{ matrix.example }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - fastapi-background
          - pytest-fixture
          - jupyter-session
          - slack-bot
          - wechat-bot

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync example dependencies (with dev extras)
        working-directory: examples/${{ matrix.example }}
        run: uv sync --python 3.12 --extra dev

      - name: Run example smoke
        working-directory: examples/${{ matrix.example }}
        env:
          PYTHONPATH: .
        run: uv run --python 3.12 pytest tests/ -v --tb=short
